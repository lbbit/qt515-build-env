name: build-and-publish-ghcr

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Qt source archives
        id: cache-qt-src
        uses: actions/cache@v4
        with:
          path: |
            qt-everywhere-src-5.15.2.tar.xz
            qtmqtt-v5.15.2.tar.gz
          key: qt-src-5.15.2-qtmqtt-v5.15.2

      - name: Download Qt source archive
        if: steps.cache-qt-src.outputs.cache-hit != 'true'
        run: |
          wget -O qt-everywhere-src-5.15.2.tar.xz \
            https://download.qt.io/archive/qt/5.15/5.15.2/single/qt-everywhere-src-5.15.2.tar.xz
          wget -O qtmqtt-v5.15.2.tar.gz \
            https://github.com/qt/qtmqtt/archive/refs/tags/v5.15.2.tar.gz

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/lbbit/qt515-build-env
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha

      - name: Build and push image with log capture
        shell: bash
        run: |
          set -o pipefail
          docker buildx build \
            --progress=plain \
            --push \
            -f Dockerfile \
            -t ghcr.io/lbbit/qt515-build-env:latest \
            -t ghcr.io/lbbit/qt515-build-env:${GITHUB_SHA} \
            . 2>&1 | tee docker-build.log

      - name: Upload docker build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-build-log
          path: docker-build.log
